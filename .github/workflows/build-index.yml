name: Build Package Index

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Generate package index and update README
        run: |
          import json
          import os
          import re
          from pathlib import Path
          from datetime import datetime, timezone

          packages_dir = Path('packages')
          packages_data = []

          # Scan packages directory
          if packages_dir.exists():
              for package_dir in sorted(packages_dir.iterdir()):
                  if not package_dir.is_dir() or package_dir.name in ['__pycache__', '.gitkeep']:
                      continue

                  metadata_file = package_dir / 'metadata.json'
                  if metadata_file.exists():
                      with open(metadata_file) as f:
                          metadata = json.load(f)
                          packages_data.append(metadata)

          # Sort packages by name
          sorted_packages = sorted(packages_data, key=lambda x: x['name'])

          # Generate packages.md
          packages_md = '''# Available Packages

This page is automatically updated when new packages are published.

'''

          for pkg in sorted_packages:
              packages_md += f'''## {pkg['name']}

**Version:** {pkg.get('version', 'unknown')}
**Repository:** {pkg.get('repository', 'N/A')}
**Python:** {pkg.get('python_requires', '>=3.9')}

### Install

\`\`\`bash
pip install --index-url https://hoad-org.github.io/python-packages {pkg['name']}
\`\`\`

**Description:** {pkg.get('description', 'No description available')}

Published: {pkg.get('published_at', 'unknown')}

---

'''

          now_utc = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          packages_md += f"*This page is maintained automatically. Last updated: {now_utc}*"

          Path('docs').mkdir(exist_ok=True)
          Path('docs/packages.md').write_text(packages_md)

          # Update README.md with packages table
          if Path('README.md').exists():
              readme_content = Path('README.md').read_text()

              # Generate packages table
              table = "| Package | Version | Python | Repository |\n"
              table += "|---------|---------|--------|----------|\n"
              for pkg in sorted_packages:
                  name = pkg['name']
                  version = pkg.get('version', 'unknown')
                  python = pkg.get('python_requires', '>=3.9')
                  repo = pkg.get('repository', 'N/A')
                  table += f"| {name} | {version} | {python} | [{name}]({repo}) |\n"

              # Replace or add Available Packages section
              pattern = r'## Available Packages\n\n\|.*?\n.*?\n.*?For detailed'
              replacement = f"## Available Packages\n\n{table}\nFor detailed"

              if re.search(pattern, readme_content, re.DOTALL):
                  new_readme = re.sub(pattern, replacement, readme_content, flags=re.DOTALL)
              else:
                  # If section doesn't exist, add it after Installation section
                  new_readme = readme_content

              Path('README.md').write_text(new_readme)

        shell: python3 {0}

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/packages.md README.md
          git commit -m "chore: auto-update package index and README" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
