name: Build Package Index

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Generate package index
        run: |
          import json
          import os
          from pathlib import Path
          from datetime import datetime

          packages_dir = Path('packages')
          packages_data = []

          # Scan packages directory
          for package_dir in packages_dir.iterdir():
              if not package_dir.is_dir() or package_dir.name == '__pycache__':
                  continue

              metadata_file = package_dir / 'metadata.json'
              if metadata_file.exists():
                  with open(metadata_file) as f:
                      metadata = json.load(f)
                      packages_data.append(metadata)

          # Generate packages.md
          packages_md = '''# Available Packages

This page is automatically updated when new packages are published.

'''

          for pkg in sorted(packages_data, key=lambda x: x['name']):
              packages_md += f'''## {pkg['name']}

**Version:** {pkg.get('version', 'unknown')}
**Repository:** {pkg.get('repository', 'N/A')}
**Python:** {pkg.get('python_requires', '>=3.12')}

### Install

\`\`\`bash
pip install --index-url https://hoad-org.github.io/python-packages {pkg['name']}
\`\`\`

Published: {pkg.get('published_at', 'unknown')}

---

'''

          packages_md += f"*This page is maintained automatically. Last updated: {datetime.utcnow().isoformat()}Z*"

          Path('docs/packages.md').write_text(packages_md)

        shell: python3 {0}

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/packages.md
          git commit -m "chore: auto-update package index" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: hoad-org.github.io
